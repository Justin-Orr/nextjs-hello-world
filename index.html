<!doctype html>
<html lang="en">
    <body>
        <div id="app"></div>
        <script src="https://unpkg.com/react@18/umd/react.development.js"></script> <!-- Core React library -->
        <script src="https://unpkg.com/react-dom@18/umd/react-dom.development.js"></script> <!-- React-dom provides DOM-specific methods that enable you to use React with the DOM. -->
        <script src="https://unpkg.com/@babel/standalone/babel.min.js"></script> <!-- Babel for JSX support -->
        <script type="text/jsx">
            const domNode = document.getElementById('app');
            
            // New react component
            function Header({title}) {
                return <h1>{title}</h1>;
            }

            function HomePage() {
                const names = ['Ada Lovelace', 'Grace Hopper', 'Margaret Hamilton'];
                const [likes, setLikes] = React.useState(0);

                function handleClick() {
                    console.log('increment like count');
                    setLikes(likes + 1);
                }
                
                // Passing data diretly using props (mutable properties)
                return (
                    <div>
                        <div>
                            <Header title="React"/> 
                            <Header title="A new title"/> 
                        </div>
                        <div>
                            <Header title="Develop. Previeew. Ship"/>
                            <ul>
                                {names.map( (name) => (<li key={name}> {name} </li>))}         
                            </ul>
                        </div>
                        <button onClick={ handleClick }>Like ({likes})</button>
                    </div>
                );
                // Reminder: The key in the list item generally should be a unique identifier. 
                // This example uses the name since all names in the list are different.
            }

            const root = ReactDOM.createRoot(domNode);
            root.render(<HomePage />);
        </script>
    </body>
</html>
